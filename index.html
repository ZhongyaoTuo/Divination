<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>灵境卜筮 · 天命鉴</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 样式保持与之前相同，省略重复（实际使用时复制完整样式） */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0e0b14; background-image: radial-gradient(circle at 10% 20%, rgba(46,34,59,0.6) 0%, #0a0812 100%); font-family: 'Inter', sans-serif; color: #ece4e4; padding: 2rem 1.2rem; }
        .container { max-width: 720px; margin: 0 auto; }
        .temple-header { text-align: center; margin-bottom: 2rem; }
        .temple-header h1 { font-family: 'Noto Serif SC', serif; font-size: 2.6rem; background: linear-gradient(135deg, #f5e7a7, #cb9e5f); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 6px; }
        .oracle-card { background: rgba(20,16,29,0.75); backdrop-filter: blur(12px); border-radius: 2rem; border: 1px solid rgba(203,158,95,0.35); padding: 2rem 1.8rem; }
        .form-group { margin-bottom: 1.6rem; }
        label { display: flex; align-items: center; gap: 8px; color: #e9ddc7; margin-bottom: 0.6rem; }
        label i { color: #cb9e5f; }
        input, select, textarea { width: 100%; background: #1e192b; border: 1px solid #3f3250; border-radius: 24px; padding: 12px 18px; color: #f2ede4; font-size: 0.95rem; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #cb9e5f; box-shadow: 0 0 0 3px rgba(203,158,95,0.2); }
        .row-2col { display: flex; gap: 1rem; flex-wrap: wrap; }
        .row-2col .form-group { flex: 1; }
        button { background: linear-gradient(95deg, #cb9e5f, #a47c44); width: 100%; padding: 14px 0; font-weight: 700; font-size: 1.1rem; font-family: 'Noto Serif SC', serif; color: #0e0b14; border-radius: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; border: none; }
        button:hover { transform: scale(0.98); }
        .answer-area { margin-top: 2rem; padding: 1.2rem 1.5rem; background: rgba(0,0,0,0.45); border-radius: 2rem; border-left: 4px solid #cb9e5f; }
        .answer-title { color: #cb9e5f; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        .answer-content { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; line-height: 1.5; color: #f3e9da; }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f1b2b; backdrop-filter: blur(12px); padding: 8px 18px; border-radius: 60px; color: #efdfb7; border: 1px solid #b5925a; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; }
        .footer-note { text-align: center; font-size: 0.7rem; margin-top: 2rem; color: #7a6d5a; }
        .config-banner { background: rgba(0,0,0,0.6); border-radius: 60px; padding: 8px 18px; margin-bottom: 1.5rem; font-size: 0.75rem; text-align: center; border: 1px solid #cb9e5f50; }
    </style>
</head>
<body>
<div class="container">
    <div id="configBanner" class="config-banner"><i class="fas fa-cloud-upload-alt"></i> ⛩️ 灵境已开 · 命书将存入云端</div>
    <div class="temple-header"><h1>灵境卜筮</h1><p>· 窥天命 · 解惑障 ·</p></div>
    <div class="oracle-card">
        <form id="fortuneForm">
            <div class="form-group"><label><i class="fas fa-feather-alt"></i> 求问者姓名</label><input type="text" id="userName" placeholder="例：林玄清" required></div>
            <div class="row-2col">
                <div class="form-group"><label><i class="fas fa-calendar-alt"></i> 出生日期</label><input type="date" id="birthDate" required></div>
                <div class="form-group"><label><i class="fas fa-moon"></i> 出生时辰</label>
                    <select id="birthTime">
                        <option>子时 (23:00-01:00)</option><option>丑时 (01:00-03:00)</option><option>寅时 (03:00-05:00)</option>
                        <option>卯时 (05:00-07:00)</option><option>辰时 (07:00-09:00)</option><option>巳时 (09:00-11:00)</option>
                        <option>午时 (11:00-13:00)</option><option>未时 (13:00-15:00)</option><option>申时 (15:00-17:00)</option>
                        <option>酉时 (17:00-19:00)</option><option>戌时 (19:00-21:00)</option><option>亥时 (21:00-23:00)</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label><i class="fas fa-yin-yang"></i> 八字 (若知晓)</label><input type="text" id="bazi" placeholder="例：甲子年 丙寅月 戊午日 壬子时"></div>
            <div class="form-group"><label><i class="fas fa-comment-dots"></i> 所问何事</label><textarea rows="3" id="question" placeholder="请详述您的困惑..." required></textarea></div>
            <button type="submit" id="submitBtn"><i class="fas fa-scroll"></i> 叩问天命 · 得解</button>
        </form>
        <div id="answerContainer" class="answer-area" style="display: none;"><div class="answer-title"><i class="fas fa-crown"></i> 灵境真言</div><div class="answer-content" id="answerText"></div></div>
    </div>
    <div class="footer-note"><i class="fas fa-database"></i> 命书永存云端 · 天机可鉴</div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // ==================== sheet.best 配置 ====================
    const SHEETBEST_API = "https://api.sheetbest.com/sheets/0070b321-2e6a-4b9b-bd2c-ef0174dab86c";

    // DOM 元素
    const form = document.getElementById('fortuneForm');
    const submitBtn = document.getElementById('submitBtn');
    const answerContainer = document.getElementById('answerContainer');
    const answerTextEl = document.getElementById('answerText');
    const toastMsg = document.getElementById('toastMsg');

    function showToast(msg, isErr = false) {
        toastMsg.innerText = msg;
        toastMsg.style.backgroundColor = isErr ? '#3b2a2a' : '#1f1b2b';
        toastMsg.style.opacity = '1';
        setTimeout(() => toastMsg.style.opacity = '0', 3000);
    }

    function setLoading(loading) {
        submitBtn.disabled = loading;
        submitBtn.innerHTML = loading ? '<i class="fas fa-spinner fa-pulse"></i> 叩问天机中...' : '<i class="fas fa-scroll"></i> 叩问天命 · 得解';
    }

    function displayAnswer(text) {
        answerTextEl.innerText = text;
        answerContainer.style.display = 'block';
        answerContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function gatherFormData() {
        const name = document.getElementById('userName').value.trim();
        const birthDate = document.getElementById('birthDate').value;
        const birthTime = document.getElementById('birthTime').value;
        const bazi = document.getElementById('bazi').value.trim() || "未提供";
        const question = document.getElementById('question').value.trim();
        if (!name || !birthDate || !question) {
            showToast("请完整填写姓名、出生日期和问题", true);
            return null;
        }
        return { name, birthDate, birthTime, bazi, question, timestamp: new Date().toISOString() };
    }

    function generateWisdomAnswer(name, question) {
        const answers = [
            `「金舆驻运」${name}，所问之事根基渐固，未来半年多遇良机。`,
            `「玉堂照命」静守初心，冬末春初可得悦音。`,
            `「天德护佑」${name}，有贵人暗助，无需过分忧惧。`,
            `「华盖文曲」答案在书本/旅途中，多阅世增慧。`,
            `「驿马星动」奔波可成，变动反而是吉兆。`,
            `「红鸾隐现」缘近矣，夏秋之际可有相遇之喜。`,
            `「紫微临垣」坚持计划，切勿半途而废。`,
            `「太乙扶身」稍有波折但结局豁然，心存善念天必佑之。`
        ];
        let idx = (name.length + question.length) % answers.length;
        return answers[idx] + " —— 灵境真言";
    }

    async function submitToSheetBest(data) {
        try {
            const response = await fetch(SHEETBEST_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (!response.ok) {
                let errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }
            const result = await response.json();
            // sheet.best 成功返回 { id: "..." }
            if (result && result.id) {
                return { success: true, answer: generateWisdomAnswer(data.name, data.question) };
            } else {
                throw new Error('API 返回异常');
            }
        } catch (err) {
            console.error(err);
            return { success: false, error: err.message };
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = gatherFormData();
        if (!formData) return;
        setLoading(true);
        answerContainer.style.display = 'none';
        const result = await submitToSheetBest(formData);
        if (result.success) {
            displayAnswer(result.answer);
            showToast("✓ 命书已入天机册，灵境真言已现");
        } else {
            displayAnswer("卦象暂晦，灵机受阻。请稍后再叩问。");
            showToast("保存失败: " + result.error, true);
        }
        setLoading(false);
    });

    window.addEventListener('load', () => {
        console.log("灵境卜筮 · 使用 sheet.best 存储");
        showToast("灵境已开，恭候缘人");
    });
</script>
</body>
</html>
